<div style="min-height: 100vh; background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)); display: flex; align-items: center; justify-content: center; padding: 1rem;">
  <!-- Theme Toggle Button -->
  <button 
    (click)="toggleTheme()" 
    style="position: absolute; top: 1rem; right: 1rem; padding: 0.5rem; border-radius: 0.5rem; background-color: var(--bg-primary); border: none; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); font-size: 1.5rem; transition: box-shadow 0.3s ease;"
    [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    onmouseover="this.style.boxShadow='0 20px 25px -5px rgba(0, 0, 0, 0.1)'"
    onmouseout="this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)'"
  >
    <span *ngIf="!isDarkMode">🌙</span>
    <span *ngIf="isDarkMode">☀️</span>
  </button>

  <div style="background-color: var(--bg-primary); border-radius: 0.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); padding: 2rem; width: 100%; max-width: 28rem;">
    <h2 style="font-size: 1.875rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.5rem; text-align: center;">Login</h2>
    
    <form style="display: flex; flex-direction: column; gap: 1rem;">
      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Email Address</label>
        <input 
          type="email"
          placeholder="Enter your email" 
          style="width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--input-border); border-radius: 0.5rem; background-color: var(--input-bg); color: var(--input-text); font-size: 1rem; transition: border-color 0.3s ease; box-sizing: border-box;"
          onkeyup="this.style.borderColor='#3b82f6'"
          required
        />
      </div>
      
      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem;">Password</label>
        <input 
          type="password"
          placeholder="Enter your password" 
          style="width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--input-border); border-radius: 0.5rem; background-color: var(--input-bg); color: var(--input-text); font-size: 1rem; transition: border-color 0.3s ease; box-sizing: border-box;"
          onkeyup="this.style.borderColor='#3b82f6'"
          required
        />
      </div>
      
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <label style="display: flex; align-items: center; cursor: pointer;">
          <input type="checkbox" style="width: 1rem; height: 1rem; accent-color: #3b82f6;">
          <span style="margin-left: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">Remember me</span>
        </label>
        <a href="#" style="font-size: 0.875rem; color: #3b82f6; text-decoration: none;" onmouseover="this.textDecoration='underline'" onmouseout="this.textDecoration='none'">Forgot password?</a>
      </div>
      
      <button type="submit" style="width: 100%; background: linear-gradient(90deg, #3b82f6, #9333ea); color: white; font-weight: 600; padding: 0.75rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;" onmouseenter="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)'" onmouseleave="this.style.transform='scale(1)'; this.style.boxShadow='none'">
        Login
      </button>
    </form>
    
    <p style="text-align: center; color: var(--text-secondary); font-size: 0.875rem; margin-top: 1.5rem;">
      Don't have an account? <a href="#" style="color: #3b82f6; font-weight: 600; text-decoration: none;" onmouseover="this.textDecoration='underline'" onmouseout="this.textDecoration='none'">Sign up here</a>
    </p>
  </div>
</div>
